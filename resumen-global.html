  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Poppins", sans-serif; background: linear-gradient(135deg, #e6f0ff 0%, #f0e6ff 100%); min-height: 100vh; color: #001a4d; }
    .navbar { background: linear-gradient(135deg, #001a4d 0%, #003d99 100%); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(0,26,77,0.3); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 38px; font-weight: 700; text-decoration: none; display: flex; align-items: stretch; align-self: stretch; margin: -16px 0 -16px -32px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: #e6f0ff; color: #0066cc; border: 2px solid #99ccff; border-radius: 8px; font-weight: 600; font-size: 13px; text-decoration: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .back-btn:hover { background: #0066cc; color: white; }
    .navbar-right { display: flex; align-items: center; gap: 16px; }

    .profile-icon { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

    .container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    .page-title { font-size: 26px; font-weight: 700; color: #001a4d; margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: #667; margin-bottom: 24px; }
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }

    .sum-card.green { border-top-color: #22c55e; }

    .sum-value.green { color: #16a34a; }
    .sum-value.red { color: #dc2626; }

    .table-section { background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,26,77,0.08); overflow-x: auto; margin-bottom: 24px; position: relative; }
    .table-header { padding: 16px 24px; border-bottom: 1px solid #eef; display: flex; align-items: center; justify-content: space-between; position: relative; height: 60px; }
    .table-title { font-size: 15px; font-weight: 700; color: #001a4d; }
    .month-nav { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.98); border-radius: 8px; padding: 6px 8px; display: flex; align-items: center; gap: 4px; z-index: 10; box-shadow: 0 2px 8px rgba(0,26,77,0.12); }
    .nav-arrow { background: #f0f4ff; border: 1px solid #dde; border-radius: 4px; width: 24px; height: 24px; cursor: pointer; font-size: 13px; color: #003d99; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0; }
    .nav-arrow:hover { background: #e0ebff; border-color: #003d99; }
    .month-tabs { display: flex; gap: 3px; }
    .month-tab { padding: 4px 8px; border-radius: 6px; border: 1px solid #dde; background: white; cursor: pointer; font-size: 10px; font-weight: 600; color: #667; white-space: nowrap; transition: all 0.1s; }
    .month-tab:hover { border-color: #003d99; color: #003d99; }
    .month-tab.active { background: #003d99; border-color: #003d99; color: white; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid #f0f4ff; border-right: 1px solid #dde8ff; }
    td:last-child { border-right: none; }
    td:first-child { width: 180px; font-weight: 600; color: #446; }
    td:not(:first-child) { width: 115px; min-width: 115px; max-width: 115px; }
    tr.header-row td { background: #f0f5ff; font-weight: 700; color: #003d99; text-align: center; padding: 8px 10px; border-bottom: 2px solid #dde8ff; border-right: 1px solid #dde8ff; height: 24px; }
    tr.header-row td:last-child { border-right: none; }
    tr.header-row td:first-child { text-align: left; color: #446; }
    tr.sec-header td { background: #eef3ff; font-weight: 700; font-size: 12px; color: #335; border-left: 4px solid #3b82f6; padding: 9px 14px; text-align: center; letter-spacing: 3px; }
    tr.total-row td { background: #e8efff; font-weight: 700; font-size: 12px; border-top: 1px solid #c5d5ff; }
    tr.balance-row { background: #f0fdf4; border-top: 3px solid #22c55e; }
    tr.balance-row td { font-weight: 700; color: #16a34a; }
    .input-cell input { background: transparent; border: 1px solid transparent; padding: 4px 6px; text-align: right; width: 95%; font-size: 12px; color: #dc2626; cursor: pointer; border-radius: 4px; font-family: Poppins; }
    .input-cell input:hover { border-color: #a7f3d0; background: #f0fff8; }
    .input-cell input:focus { outline: none; border-color: #10b981; background: #f0fff8; box-shadow: inset 0 0 0 2px rgba(16, 185, 129, 0.1); }
    .btn-add { padding: 6px 12px; background: #003d99; color: white; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-add:hover { background: #0052cc; }
    .var-row { display: flex; gap: 8px; align-items: center; padding: 10px 0; }
    .var-select { padding: 6px 8px; border: 1px solid #a7f3d0; border-radius: 4px; font-size: 12px; background: white; flex: 0 0 100px; }
    .var-input-detail { padding: 6px 8px; border: 1px solid #a7f3d0; border-radius: 4px; font-size: 12px; flex: 1; min-width: 150px; }
    .var-input-monto { padding: 6px 8px; border: 1px solid #a7f3d0; border-radius: 4px; font-size: 12px; flex: 0 0 80px; }
    .var-btn { padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .var-btn:hover { background: #059669; }
  </style>
</head>

        <button onclick="saveVarFromCard()" style="padding:5px 12px;background:#10b981;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;">Agregar</button>

<div id="var-detail-popup" style="display:none; position:fixed; z-index:2000; background:white; border-radius:10px; box-shadow:0 8px 32px rgba(0,26,77,0.18); padding:16px 20px; min-width:260px; max-width:340px; max-height:400px; overflow-y:auto;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <span id="var-popup-title" style="font-size:13px; font-weight:700; color:#001a4d;"></span>

<div class="modal-overlay" id="configModal" style="position: fixed; inset: 0; background: rgba(0,26,77,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999;">
  <div style="background: white; border-radius: 16px; padding: 28px 32px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,26,77,0.25);">
    <h3 style="font-size: 18px; color: #001a4d; margin-bottom: 20px;">⚙️ Configuración</h3>
    <div style="margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid #eef;">
      <h4 style="font-size: 13px; font-weight: 700; color: #446; margin-bottom: 10px;">Valor UF actual</h4>
      <div style="display: flex; gap: 10px; align-items: center;">

  </div>

<script>
  const sbUrl = 'https://vfqjcyecqecfrevmnivy.supabase.co';
  const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWpjeWVjcWVjZnJldm1uaXZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NTc3NTQsImV4cCI6MjA5ODUzMzc1NH0.dNdouTXa3p1ctM6IdJXm0U_bqopEFAh5NoJCeYNDdzk';
  const mySupabase = supabase.createClient(sbUrl, sbKey);

  let currentUser = null;
  let ufValue = 38000;
  let fixedCategories = ['Arriendo/Dividendo','Luz','Agua','Internet','Celular','Gastos Comunes'];
  let varCategories = ['Supermercado','Transporte','Salud','Ropa','Entretenimiento','Otro'];
  let selectedMonth = '2026-06';
  let allMonths = [];
  let visibleMonths = [];
  let allData = {};
  let comidaViajesIncluido = {};
  let debtCategories = [];
  let allDebtsWithInstallments = [];
  let arrSubcats = [];

  function generateMonths() {
    const months = [];
    const baseDate = new Date(2026, 5, 1);
    for (let i = -6; i <= 12; i++) {
      const d = new Date(baseDate.getFullYear(), baseDate.getMonth() + i, 1);
      months.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
    }
    return months;
  }

  function monthLabel(str) {
    const [y, m] = str.split('-');
    return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1] + ' ' + y.slice(2);
  }

  function formatNum(n) {
    if (typeof n === 'string') {
        n = parseFloat(n.replace(/[$\.\s]/g,'').replace(',','.')) || 0;
    }
    if (!n || isNaN(n)) return '$0';
    return '$' + Math.round(Number(n)).toLocaleString('es-CL');
  }

  function parseAmount(str) {
    return parseFloat(str.toString().replace(/[$\.\s]/g,'').replace(',','.')) || 0;
  }

  function initVisibleMonths() {
    const idx = allMonths.indexOf(selectedMonth);
    visibleMonths = allMonths.slice(idx, idx + 4);
    if (visibleMonths.length < 4) {
      const remaining = 4 - visibleMonths.length;
      for (let i = 1; i <= remaining; i++) {
        const nextIdx = idx + 3 + i;
        if (nextIdx < allMonths.length) visibleMonths.push(allMonths[nextIdx]);
      }
    }
  }

  mySupabase.auth.getSession().then(({ data }) => {
    if (data.session) {
      currentUser = data.session.user;
      const _meta = currentUser.user_metadata || {};
      const _fullName = (_meta.full_name || ((_meta.nombre || '') + ' ' + (_meta.apellido || '')).trim()) || currentUser.email.split('@')[0];
      document.getElementById('welcomeText').textContent = `¡Bienvenido, ${_fullName}!`;
      document.getElementById('profileIcon').textContent = _fullName.charAt(0).toUpperCase();
      allMonths = generateMonths();
      initVisibleMonths();
      init();
    } else { window.location.href = 'Final.html'; }
  });

  async function init() {
    try { await loadConfig(); } catch(e) { console.warn(e); }
    loadArrSubcats();
    try { await loadAll(); } catch(e) { console.warn(e); }
    try { loadBalanceTotal(); } catch(e) { console.warn(e); }
    renderTable();
  }

  function loadBalanceTotal() {
    // El bloque Balance Total fue reemplazado por Gastos Variables
  }

  async function loadConfig() {
    try {
      const { data } = await mySupabase.from('user_config').select('*').eq('user_id', currentUser.id).single();
      if (data) { ufValue = parseFloat(data.uf_value) || 38000; }
    } catch(e) {}
    document.getElementById('card-uf').textContent = formatNum(ufValue);
  }

  async function loadAll() {
    allData = {};
    comidaViajesIncluido = {};

    // Cargar categorías + deudas una sola vez
    try {
      const [catsRes, debtsRes] = await Promise.all([
        mySupabase.from('debt_categories').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true }),
        mySupabase.from('debts').select('*, installments(*)').eq('user_id', currentUser.id)
      ]);
      debtCategories = catsRes.data || [];
      allDebtsWithInstallments = debtsRes.data || [];
    } catch(e) { debtCategories = []; allDebtsWithInstallments = []; }

    // Cargar cada mes en paralelo
    await Promise.all(visibleMonths.map(async (m) => {
      allData[m] = { income: [], fixed: {}, variable: [], deudas: 0, deudasPorCategoria: {}, comidas: 0, comidasCount: 0, viajes: 0, viajesCount: 0 };
      comidaViajesIncluido[m] = { comidas: false, viajes: false };
      const [y, mon] = m.split('-');

      // 5 consultas del mes en paralelo
      const [incR, fixR, varR, mealsR, tripsR] = await Promise.all([
        mySupabase.from('monthly_income').select('*').eq('user_id', currentUser.id).eq('month', m),
        mySupabase.from('monthly_fixed_expenses').select('*').eq('user_id', currentUser.id).eq('month', m),
        mySupabase.from('monthly_variable_expenses').select('*').eq('user_id', currentUser.id).eq('month', m).order('created_at', { ascending: false }),
        mySupabase.from('meals').select('*').eq('user_id', currentUser.id).gte('created_at', y+'-'+mon+'-01').lte('created_at', y+'-'+mon+'-31'),
        mySupabase.from('trips').select('expenses, my_participant_name, trip_participants(name)').eq('user_id', currentUser.id).gte('created_at', y+'-'+mon+'-01').lte('created_at', y+'-'+mon+'-31')
      ]);

      allData[m].income = incR.data || [];

      (fixR.data || []).forEach(r => {
        if (r.category === '__comidas_include') comidaViajesIncluido[m].comidas = parseFloat(r.amount) === 1;
        else if (r.category === '__viajes_include') comidaViajesIncluido[m].viajes = parseFloat(r.amount) === 1;
        else allData[m].fixed[r.category] = r;
      });

      allData[m].variable = varR.data || [];

      // Deudas (cálculo local)
      const monthDate = new Date(parseInt(y), parseInt(mon) - 1, 1);
      debtCategories.forEach(cat => {
        let total = 0;
        allDebtsWithInstallments.filter(d => d.category_id === cat.id).forEach(debt => {
          const diff = (monthDate.getFullYear() - new Date(debt.start_date).getFullYear()) * 12 + (monthDate.getMonth() - new Date(debt.start_date).getMonth());
          if (diff >= 0 && diff < debt.num_installments) {
            const inst = (debt.installments || []).find(i => i.month_number === diff);
            if (inst && inst.paid !== true) total += parseFloat(inst.amount || 0);
          }
        });
        allData[m].deudasPorCategoria[cat.id] = total;
      });
      allData[m].deudas = Object.values(allData[m].deudasPorCategoria).reduce((s, v) => s + v, 0);

      (mealsR.data || []).forEach(meal => {
        try { const d = JSON.parse(meal.data); if (d.me && d.personTotals?.[d.me]) { allData[m].comidas += d.personTotals[d.me]; allData[m].comidasCount++; } } catch(e) {}
      });

      (tripsR.data || []).forEach(trip => {
        try {
          const expenses = trip.expenses || []; const myName = trip.my_participant_name;
          if (!expenses.length || !myName) return;
          const pb = {};
          (trip.trip_participants || []).forEach(p => { pb[p.name] = { paid: 0, owes: 0 }; });
          expenses.forEach(exp => {
            const nI = exp.installments || 1;
            const pp = (exp.total / nI) / ((exp.participants || []).length || 1);
            if (pb[exp.paidByName] !== undefined) pb[exp.paidByName].paid += exp.total;
            for (let i = 0; i < nI; i++) {
              (exp.participants || []).forEach(pName => {
                const pay = exp.installmentPayments?.[i]?.find(x => x.participantId === pName);
                const amt = exp.customCuotaAmounts?.[pName]?.[i] ?? pp;
                if (!pay?.paid && pb[pName] !== undefined) pb[pName].owes += amt;
              });
            }
          });
          if (pb[myName] !== undefined) {
            const bal = Math.max(0, pb[myName].owes - pb[myName].paid);
            if (bal > 0) allData[m].viajesCount++;
            allData[m].viajes += bal;
          }
        } catch(e) {}
      });
    }));
  }

  function renderMonthTabs() {
    let html = '<div class="month-nav"><button class="nav-arrow" onclick="scrollMonths(-1)">‹</button><div class="month-tabs">';
    visibleMonths.forEach(m => {
      html += '<button class="month-tab ' + (m===selectedMonth?'active':'') + '" onclick="selectMonth(\'' + m + '\')">' + monthLabel(m) + '</button>';
    });
    html += '</div><button class="nav-arrow" onclick="scrollMonths(1)">›</button></div>';
    const hdr = document.querySelector('.table-header');
    if (hdr) hdr.innerHTML = '<span class="table-title">💵 Flujo de Caja — ' + monthLabel(selectedMonth) + '</span>' + html;
  }

  function scrollMonths(dir) {
    const idx = allMonths.indexOf(selectedMonth);
    const newIdx = Math.max(0, Math.min(allMonths.length-1, idx + dir));
    selectedMonth = allMonths[newIdx];
    initVisibleMonths();
    renderMonthTabs();
    loadAll().then(() => renderTable());
  }

  async function selectMonth(m) {
    selectedMonth = m;
    renderMonthTabs();
    await loadAll();
    renderTable();
  }

  function renderTable() {
    if (!selectedMonth || !allData[selectedMonth]) return;
    
    const d = allData[selectedMonth];
    const income = (d.income || []).reduce((s,r) => s + parseFloat(r.amount), 0);
    const fixed = fixedCategories.reduce((s, cat) => s + parseFloat(d.fixed[cat]?.amount || 0), 0);
    const variable = (d.variable || []).reduce((s,r) => s + parseFloat(r.amount), 0);
    const comidasGastoResumen = (comidaViajesIncluido[selectedMonth]?.comidas ?? false) ? d.comidas : 0;
    const viajesGastoResumen = (comidaViajesIncluido[selectedMonth]?.viajes ?? false) ? d.viajes : 0;
    const egreso = fixed + variable + d.deudas + comidasGastoResumen + viajesGastoResumen;
    const saldo = income - egreso;
    
    document.getElementById('card-ingresos').textContent = formatNum(income);
    document.getElementById('card-egresos').textContent = formatNum(egreso);
    const cs = document.getElementById('card-saldo');
    cs.textContent = formatNum(saldo);
    cs.className = 'sum-value ' + (saldo > 0 ? 'green' : saldo > -100000 ? 'yellow' : 'red');
    const varEl = document.getElementById('card-var-total');
    if (varEl) varEl.textContent = formatNum(variable);

  function loadArrSubcats() {
    if (!currentUser) return;
    arrSubcats = JSON.parse(localStorage.getItem('arriendo_subcats_' + currentUser.id) || '[]');
  }
  function saveArrSubcats() {
    if (!currentUser) return;
    localStorage.setItem('arriendo_subcats_' + currentUser.id, JSON.stringify(arrSubcats));
  }
  function toggleArrSubcatIncluded(id, checked) {
    const sc = arrSubcats.find(s => s.id === id);
    if (!sc) return;
    sc.included = checked;
    saveArrSubcats();
    renderTable();
  }

  function toggleSignoBtnById(id) {
    const sc = arrSubcats.find(s => s.id === id);
    if (!sc) return;
    sc.tipo = sc.tipo === '+' ? '-' : '+';
    saveArrSubcats();
    renderTable();

  function toggleSignoBtn(btn) {
    if (btn.dataset.v === '+') {
      btn.dataset.v = '-'; btn.textContent = '−';
      btn.style.color = '#16a34a'; btn.style.borderColor = '#16a34a';
    } else {
      btn.dataset.v = '+'; btn.textContent = '+';
      btn.style.color = '#dc2626'; btn.style.borderColor = '#dc2626';
    }
  }

  function toggleArriendoForm() {
    const row = document.getElementById('arriendo-form-row');
    if (!row) return;
    const visible = row.style.display !== 'none';
    row.style.display = visible ? 'none' : 'table-row';
    if (!visible) {
      document.getElementById('sc-nombre').value = '';
      document.getElementById('sc-monto').value = '';
      const btn = document.getElementById('sc-signo-btn');
      if (btn) { btn.textContent = '+'; btn.dataset.v = '+'; btn.style.color = '#16a34a'; btn.style.borderColor = '#16a34a'; }
      document.getElementById('sc-nombre').focus();
    }
  }
  function openArriendoSubcat() { toggleArriendoForm(); }
  function closeArriendoSubcat() { toggleArriendoForm(); }
  function saveArriendoSubcat() {
    const nombre = document.getElementById('sc-nombre').value.trim();
    const monto = parseAmount(document.getElementById('sc-monto').value);
    const tipo = (document.getElementById('sc-signo-btn')?.dataset.v || '+') === '+' ? '+' : '-';
    if (!nombre || !monto) return;
    arrSubcats.push({ id: Date.now().toString(), nombre, tipo, monto });
    saveArrSubcats();
    renderTable();
  }
  function saveArriendoSubcatAuto() { saveArriendoSubcat(); }
  function deleteArrSubcat(id) {
    arrSubcats = arrSubcats.filter(s => s.id !== id);
    saveArrSubcats();
    renderTable();
  }

  async function saveFixed(cat, m, val) {
    const amt = parseAmount(val);
    try { await mySupabase.from('monthly_fixed_expenses').upsert({ user_id: currentUser.id, month: m, category: cat, amount: amt, is_manual_override: true }, { onConflict: 'user_id,month,category' }); } catch(e) {}
    const idx = allMonths.indexOf(m);
    if (idx !== -1) {
      for (let i = idx + 1; i < allMonths.length; i++) {
        try {
          const { data: ex } = await mySupabase.from('monthly_fixed_expenses').select('is_manual_override').eq('user_id', currentUser.id).eq('month', allMonths[i]).eq('category', cat).single();
          if (!ex || !ex.is_manual_override) {
            await mySupabase.from('monthly_fixed_expenses').upsert({ user_id: currentUser.id, month: allMonths[i], category: cat, amount: amt, is_manual_override: false }, { onConflict: 'user_id,month,category' });
          }
        } catch(e) {}
      }
    }
    await loadAll();
    renderTable();
  }

  function showVarDetail(m, el) {
    const popup = document.getElementById('var-detail-popup');
    const items = (allData[m] && allData[m].variable) ? allData[m].variable : [];
    if (!items.length) return;

    document.getElementById('var-popup-title').textContent = 'Gastos Variables — ' + monthLabel(m);

    const grouped = {};
    items.forEach(r => {
      const cat = r.category || 'Otro';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(r);
    });

    let body = '';
    Object.keys(grouped).forEach(cat => {
      const catTotal = grouped[cat].reduce((s, r) => s + parseFloat(r.amount), 0);
      body += '<div style="margin-bottom:10px;">';
      body += '<div style="font-size:11px;font-weight:700;color:#446;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">' + cat + '</div>';
      grouped[cat].forEach(r => {
        body += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f4ff;gap:8px;">';
        body += '<span style="color:#334;flex:1;">' + (r.description || cat) + '</span>';
        body += '<span style="color:#dc2626;font-weight:600;white-space:nowrap;">' + formatNum(r.amount) + '</span>';
        body += '<button onclick="deleteVarItem(\'' + r.id + '\')" title="Eliminar" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0;line-height:1;flex-shrink:0;">&times;</button>';
        body += '</div>';
      });
      if (grouped[cat].length > 1) {
        body += '<div style="text-align:right;font-size:11px;color:#10b981;font-weight:700;margin-top:2px;">Sub: ' + formatNum(catTotal) + '</div>';
      }
      body += '</div>';
    });

    document.getElementById('var-popup-body').innerHTML = body;

    // position:fixed — coords relativas al viewport, sin scrollY
    popup.style.visibility = 'hidden';
    popup.style.display = 'block';
    const rect = el.getBoundingClientRect();
    const popW = popup.offsetWidth;
    const popH = popup.offsetHeight;
    let left = rect.left + rect.width / 2 - popW / 2;
    if (left < 8) left = 8;
    if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
    let top = rect.top - popH - 10;
    if (top < 8) top = rect.bottom + 8;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.visibility = 'visible';
  }

  function showVarDetailCard() {
    const el = document.getElementById('card-var-info');
    if (el) showVarDetail(selectedMonth, el);
  }

  function openConfig() {
    document.getElementById('configUF').value = ufValue;
    document.getElementById('configModal').style.display = 'flex';
  }

  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function saveUF() {
    ufValue = parseFloat(document.getElementById('configUF').value) || 38000;
    document.getElementById('card-uf').textContent = formatNum(ufValue);
    try { await mySupabase.from('user_config').upsert({ user_id: currentUser.id, uf_value: ufValue, updated_at: new Date().toISOString() }, { onConflict: 'user_id' }); } catch(e) {}
    alert('Valor UF actualizado ✓');
  }

  async function loadComidaViajesIncluido() {
    comidaViajesIncluido = {};
    for (const m of visibleMonths) {
      try {
        const { data: fix } = await mySupabase
          .from('monthly_fixed_expenses')
          .select('category, amount')
          .eq('user_id', currentUser.id)
          .eq('month', m)
          .in('category', ['__comidas_include', '__viajes_include']);
        const cRow = (fix || []).find(r => r.category === '__comidas_include');
        const vRow = (fix || []).find(r => r.category === '__viajes_include');
        comidaViajesIncluido[m] = {
          comidas: cRow ? parseFloat(cRow.amount) === 1 : false,
          viajes:  vRow ? parseFloat(vRow.amount) === 1 : false
        };
      } catch(e) {
        comidaViajesIncluido[m] = { comidas: false, viajes: false };
      }
    }
  }

  async function toggleIncluir(m, tipo, checked) {
    if (!comidaViajesIncluido[m]) comidaViajesIncluido[m] = { comidas: false, viajes: false };
    comidaViajesIncluido[m][tipo] = checked;
    const cat = tipo === 'comidas' ? '__comidas_include' : '__viajes_include';
    try {
      await mySupabase.from('monthly_fixed_expenses').upsert({
        user_id: currentUser.id,
        month: m,
        category: cat,
        amount: checked ? 1 : 0,
        is_manual_override: true
      }, { onConflict: 'user_id,month,category' });
    } catch(e) { console.error('Error guardando estado:', e); }
    renderTable();
  }

  async function handleLogout() {
    try { await mySupabase.auth.signOut(); } catch(e) {}
    window.location.href = 'Final.html';
  }
</script>
</body>
</html>
