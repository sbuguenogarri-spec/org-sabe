<!DOCTYPE html>
<html lang="es">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; }
    body { font-family: "Poppins", sans-serif; background: linear-gradient(135deg, #e6f0ff 0%, #f0e6ff 100%); min-height: 100vh; color: #001a4d; overflow-x: hidden; }
    .navbar { background: linear-gradient(135deg, #001a4d 0%, #003d99 100%); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(0,26,77,0.3); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 12px; }
    .logo { font-size: 38px; font-weight: 700; text-decoration: none; display: flex; align-items: stretch; align-self: stretch; margin: -16px 0 -16px -32px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: white; color: #0066cc; border: 2px solid #0066cc; border-radius: 8px; font-weight: 600; font-size: 13px; text-decoration: none; cursor: pointer; transition: all 0.3s ease; white-space: nowrap; }
    .back-btn:hover { background: #0066cc; color: white; }
    .navbar-right { display: flex; align-items: center; gap: 16px; }
    .welcome-text { color: white; font-size: 14px; }
    .logout-btn { padding: 8px 16px; background: linear-gradient(135deg, #ff6b6b 0%, #ff4444 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.3s ease; }
    .profile-icon { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .btn-config { padding: 8px 16px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page-title { font-size: 26px; font-weight: 700; color: #001a4d; margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: #0066cc; margin-bottom: 24px; }
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .sum-card { background: white; border-radius: 16px; padding: 18px 20px; box-shadow: 0 4px 16px rgba(0,26,77,0.08); border-top: 4px solid #003d99; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .sum-card.green { border-top-color: #22c55e; }
    .sum-card.red { border-top-color: #ef4444; }
    .sum-card.yellow{ border-top-color: #f59e0b; }
    .sum-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .sum-value { font-size: 22px; font-weight: 700; color: #001a4d; }
    .sum-value.green { color: #16a34a; }
    .sum-value.red { color: #dc2626; }
    .sum-value.yellow { color: #d97706; }
    .table-section { background: white; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,26,77,0.08); overflow-x: auto; margin-bottom: 24px; position: relative; }
    .table-header { padding: 14px 24px; border-bottom: 1px solid #eef; display: flex; align-items: center; justify-content: space-between; position: relative; min-height: 68px; flex-wrap: wrap; gap: 8px; }
    .table-title { font-size: 15px; font-weight: 700; color: #001a4d; }
    .month-nav { background: #f0f5ff; border-radius: 12px; padding: 6px 8px; display: flex; align-items: center; gap: 6px; z-index: 10; box-shadow: 0 2px 10px rgba(0,26,77,0.1); border: 1px solid #dde8ff; }
    .nav-arrow { background: white; border: 1.5px solid #c8d8ff; border-radius: 7px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: #003d99; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.2s; flex-shrink: 0; }
    .nav-arrow:hover { background: #003d99; border-color: #003d99; color: white; box-shadow: 0 2px 8px rgba(0,61,153,0.25); }
    .month-tabs { display: flex; gap: 4px; }
    .month-tab { padding: 7px 16px; border-radius: 8px; border: 1.5px solid #c8d8ff; background: white; cursor: pointer; font-size: 12px; font-weight: 600; color: #557; white-space: nowrap; transition: all 0.2s; font-family: Poppins; }
    .month-tab:hover { border-color: #003d99; color: #003d99; background: #eef3ff; }
    .month-tab.active { background: linear-gradient(135deg, #003d99 0%, #0055cc 100%); border-color: #003d99; color: white; box-shadow: 0 2px 10px rgba(0,61,153,0.3); }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid #f0f4ff; border-right: 1px solid #dde8ff; }
    td:last-child { border-right: none; }
    td:first-child { width: 180px; font-weight: 600; color: #446; }
    td:not(:first-child) { width: 115px; min-width: 115px; max-width: 115px; }
    tr.header-row td { background: #f0f5ff; font-weight: 700; color: #003d99; text-align: center; padding: 8px 10px; border-bottom: 2px solid #dde8ff; border-right: 1px solid #dde8ff; height: 24px; }
    tr.header-row td:last-child { border-right: none; }
    tr.header-row td:first-child { text-align: left; color: #446; }
    tr.sec-header td { background: #eef3ff; font-weight: 700; font-size: 12px; color: #335; border-left: 4px solid #3b82f6; padding: 9px 14px; text-align: center; letter-spacing: 3px; }
    tr.total-row td { background: #e8efff; font-weight: 700; font-size: 12px; border-top: 1px solid #c5d5ff; }
    tr.balance-row { background: #f0fdf4; border-top: 3px solid #22c55e; }
    tr.balance-row td { font-weight: 700; color: #16a34a; }
    .input-cell input { background: transparent; border: 1px solid transparent; padding: 4px 6px; text-align: right; width: 95%; font-size: 12px; color: #dc2626; cursor: pointer; border-radius: 4px; font-family: Poppins; }
    .input-cell input:hover { border-color: #a7f3d0; background: #f0fff8; }
    .input-cell input:focus { outline: none; border-color: #10b981; background: #f0fff8; box-shadow: inset 0 0 0 2px rgba(16, 185, 129, 0.1); }
    .btn-add { padding: 6px 12px; background: #003d99; color: white; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-add:hover { background: #0052cc; }
    .var-row { display: flex; gap: 8px; align-items: center; padding: 10px 0; }
    .var-select { padding: 6px 8px; border: 1px solid #a7f3d0; border-radius: 4px; font-size: 12px; background: white; flex: 0 0 100px; }
    .var-input-detail { padding: 6px 8px; border: 1px solid #a7f3d0; border-radius: 4px; font-size: 12px; flex: 1; min-width: 150px; }
    .var-input-monto { padding: 6px 8px; border: 1px solid #a7f3d0; border-radius: 4px; font-size: 12px; flex: 0 0 80px; }
    .var-btn { padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .var-btn:hover { background: #059669; }
    .rename-btn { opacity: 0; background: none; border: none; cursor: pointer; padding: 3px 4px; border-radius: 5px; color: #6699cc; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; margin-left: 5px; transition: opacity .15s, background .15s, color .15s; line-height: 1; }
    tr:hover .rename-btn { opacity: 1; }
    .rename-btn:hover { background: #e8f0ff; color: #003d99; }
    .del-btn { color: #f87171 !important; }
    .del-btn:hover { background: #fee2e2 !important; color: #dc2626 !important; }
    /* ── TOAST ─────────────────────────────────────── */
    .rg-toast { position:fixed; bottom:28px; right:28px; padding:11px 20px; border-radius:10px; font-size:13px; font-weight:600; color:white; z-index:3000; box-shadow:0 6px 20px rgba(0,0,0,0.18); transform:translateX(130%); transition:transform .35s cubic-bezier(0.4,0,0.2,1); font-family:'Poppins',sans-serif; }
    .rg-toast.show { transform:translateX(0); }
    .rg-toast.ok  { background:linear-gradient(135deg,#16a34a,#15803d); }
    .rg-toast.err { background:linear-gradient(135deg,#dc2626,#b91c1c); }
    /* ── SKELETON SCREENS ──────────────────────────── */
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .sk { background: linear-gradient(90deg,#e8edf5 25%,#f0f4ff 50%,#e8edf5 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 6px; }
    .sk-line { height: 13px; margin-bottom: 10px; }
    .sk-title { height: 18px; width: 55%; margin-bottom: 14px; }
    .sk-short { width: 38%; }
    .sk-card { background: white; border-radius: 16px; padding: 22px; box-shadow: 0 4px 16px rgba(0,26,77,0.08); border-top: 4px solid #e8edf5; }
    /* ── HOVER EFFECTS ───────────────────────── */
    .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,107,107,0.35); }
    .sum-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,26,77,0.14); }
    /* ── RESPONSIVE ─────────────────────────── */
    @media (max-width: 1100px) {
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .navbar { padding: 12px 16px; }
      .logo { margin: -12px 0 -12px -16px !important; }
      .welcome-text { display: none; }
      .container { padding: 12px 14px; }
      .summary-cards { grid-template-columns: 1fr; }
      .sum-value { font-size: 18px; }
      .page-title { font-size: 20px; }
      td { padding: 7px 8px; font-size: 11px; }
      td:first-child { width: 130px !important; }
      td:not(:first-child) { min-width: 0 !important; max-width: none !important; width: auto !important; }
    }
    /* ── BOTTOM NAV (mobile) ─────────────────────────────── */
    .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #dde8ff; z-index:500; padding:6px 0 max(6px,env(safe-area-inset-bottom)); box-shadow:0 -4px 16px rgba(0,26,77,0.1); }
    @media(max-width:768px){ .bottom-nav{display:flex;justify-content:space-around;} body{padding-bottom:68px!important;} }
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#99a;padding:4px 6px;border-radius:8px;transition:color .2s;min-width:40px;}
    .bn-item.active,.bn-item:hover{color:#003d99;} .bn-icon{font-size:18px;line-height:1.2;} .bn-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;font-family:'Poppins',sans-serif;}
    /* ══════════════════════════════════════════════════════════════
       MODO OSCURO — Rediseño completo

<body>
<nav class="navbar">
  <a href="Final.html" class="logo"><span style="background:white;-webkit-text-fill-color:#001a4d;font-weight:700;padding:0 12px 0 32px;display:flex;align-items:center;margin-right:-8px;">org</span><span style="display:block;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#8b00ff);margin:0;align-self:center;flex-shrink:0;position:relative;z-index:1;"></span><span style="-webkit-text-fill-color:white;font-weight:700;align-self:center;padding-left:8px;">BASE</span></a>

    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;"><span class="welcome-text" id="welcomeText"></span><span id="navbar-datetime" style="font-size:11px;color:rgba(255,255,255,0.65);font-family:'Poppins',sans-serif;letter-spacing:0.2px;display:flex;gap:12px;"></span></div>

  </div>
</nav>

<script>
  const sbUrl = 'https://vfqjcyecqecfrevmnivy.supabase.co';
  const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWpjeWVjcWVjZnJldm1uaXZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NTc3NTQsImV4cCI6MjA5ODUzMzc1NH0.dNdouTXa3p1ctM6IdJXm0U_bqopEFAh5NoJCeYNDdzk';
  const mySupabase = supabase.createClient(sbUrl, sbKey);
 
  let currentUser = null;
  let ufValue = 38000;
  const DEFAULT_FIXED_CATS = ['Arriendo/Dividendo','Luz','Agua','Internet','Celular','Gastos Comunes'];
  let fixedCategories = ['Arriendo/Dividendo','Luz','Agua','Internet','Celular','Gastos Comunes'];
  let varCategories = ['Supermercado','Transporte','Salud','Ropa','Entretenimiento','Otro'];
  let selectedMonth = '2026-06';
  let allMonths = [];
  let visibleMonths = [];
  let allData = {};
  let comidaViajesIncluido = {};
  let debtCategories = [];
  let allDebtsWithInstallments = [];
  let arrSubcats = [];
 
  function generateMonths() {
    const months = [];
    const baseDate = new Date(2026, 5, 1);
    for (let i = -6; i <= 12; i++) {
      const d = new Date(baseDate.getFullYear(), baseDate.getMonth() + i, 1);
      months.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
    }
    return months;
  }
 
  function monthLabel(str) {
    const [y, m] = str.split('-');
    return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1] + ' ' + y.slice(2);
  }
 
  function formatNum(n) {
    if (typeof n === 'string') {
        n = parseFloat(n.replace(/[$\.\s]/g,'').replace(',','.')) || 0;
    }
    if (!n || isNaN(n)) return '$0';
    return '$' + Math.round(Number(n)).toLocaleString('es-CL');
  }
 
  function parseAmount(str) {
    return parseFloat(str.toString().replace(/[$\.\s]/g,'').replace(',','.')) || 0;
  }
 
  // ── Utilidades UI ──────────────────────────────────────
  let _toastTimer;
  function rgToast(msg, ok = true) {
    const el = document.getElementById('rg-toast');
    if (!el) return;
    el.textContent = msg;
    el.className = 'rg-toast ' + (ok ? 'ok' : 'err');
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
 
  function initVisibleMonths() {
    const idx = allMonths.indexOf(selectedMonth);
    visibleMonths = allMonths.slice(idx, idx + 4);
    if (visibleMonths.length < 4) {
      const remaining = 4 - visibleMonths.length;
      for (let i = 1; i <= remaining; i++) {
        const nextIdx = idx + 3 + i;
        if (nextIdx < allMonths.length) visibleMonths.push(allMonths[nextIdx]);
      }
    }
  }
 
  mySupabase.auth.getSession().then(({ data }) => {
    if (data.session) {
      currentUser = data.session.user;
      const _meta = currentUser.user_metadata || {};
      const _fullName = (_meta.full_name || ((_meta.nombre || '') + ' ' + (_meta.apellido || '')).trim()) || currentUser.email.split('@')[0];
      document.getElementById('welcomeText').textContent = `¡Bienvenido, ${_fullName}!`;
      document.getElementById('profileIcon').textContent = _fullName.charAt(0).toUpperCase();
      allMonths = generateMonths();
      initVisibleMonths();
      init();
    } else { window.location.href = 'Final.html'; }
  });
 
  async function init() {
    try { await loadConfig(); } catch(e) { console.warn(e); }
    loadFixedCategories();
    loadArrSubcats();
    try { await loadAll(); } catch(e) { console.warn(e); }
    try { loadBalanceTotal(); } catch(e) { console.warn(e); }
    renderTable();
  }
 
  function loadBalanceTotal() {
    // El bloque Balance Total fue reemplazado por Gastos Variables
  }
 
  async function loadConfig() {
    try {
      const { data } = await mySupabase.from('user_config').select('*').eq('user_id', currentUser.id).single();
      if (data) { ufValue = parseFloat(data.uf_value) || 38000; }
    } catch(e) {}
    document.getElementById('card-uf').textContent = formatNum(ufValue);
  }
 
  // Cache TTL de 3 minutos para datos de resumen
  const _CACHE_TTL = 3 * 60 * 1000;
  function _cacheKey(m) { return 'rg_' + currentUser.id + '_' + m; }
  function _cacheGet(m) {
    try {
      const raw = sessionStorage.getItem(_cacheKey(m));
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > _CACHE_TTL) { sessionStorage.removeItem(_cacheKey(m)); return null; }
      return data;
    } catch(e) { return null; }
  }
  function _cacheSet(m, data) {
    try { sessionStorage.setItem(_cacheKey(m), JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
  }
  function invalidateCache(months) {
    try {
      if (months && months.length) {
        // Invalidar solo los meses afectados (más eficiente)
        months.forEach(m => sessionStorage.removeItem(_cacheKey(m)));
      } else {
        // Invalidar todo (ej: al renombrar categoría)
        Object.keys(sessionStorage).filter(k => k.startsWith('rg_')).forEach(k => sessionStorage.removeItem(k));
      }
    } catch(e) {}
  }
 
  async function loadAll() {
    allData = {};
    comidaViajesIncluido = {};
 
    // Cargar categorías + deudas una sola vez
    try {
      const [catsRes, debtsRes] = await Promise.all([
        mySupabase.from('debt_categories').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true }),
        mySupabase.from('debts').select('*, installments(*)').eq('user_id', currentUser.id)
      ]);
      debtCategories = catsRes.data || [];
      allDebtsWithInstallments = debtsRes.data || [];
    } catch(e) { debtCategories = []; allDebtsWithInstallments = []; }
 
    // Cargar cada mes en paralelo
    await Promise.all(visibleMonths.map(async (m) => {
      allData[m] = { income: [], fixed: {}, variable: [], deudas: 0, deudasPorCategoria: {}, comidas: 0, comidasCount: 0, viajes: 0, viajesCount: 0 };
      comidaViajesIncluido[m] = { comidas: false, viajes: false };
      const [y, mon] = m.split('-');
 
      // 5 consultas del mes en paralelo
      const [incR, fixR, varR, mealsR, tripsR] = await Promise.all([
        mySupabase.from('monthly_income').select('*').eq('user_id', currentUser.id).eq('month', m),
        mySupabase.from('monthly_fixed_expenses').select('*').eq('user_id', currentUser.id).eq('month', m),
        mySupabase.from('monthly_variable_expenses').select('*').eq('user_id', currentUser.id).eq('month', m).order('created_at', { ascending: false }),
        mySupabase.from('meals').select('*').eq('user_id', currentUser.id).gte('created_at', y+'-'+mon+'-01').lte('created_at', y+'-'+mon+'-31'),
        mySupabase.from('trips').select('expenses, my_participant_name, trip_participants(name)').eq('user_id', currentUser.id).gte('created_at', y+'-'+mon+'-01').lte('created_at', y+'-'+mon+'-31')
      ]);
 
      allData[m].income = incR.data || [];
 
      (fixR.data || []).forEach(r => {
        if (r.category === '__comidas_include') comidaViajesIncluido[m].comidas = parseFloat(r.amount) === 1;
        else if (r.category === '__viajes_include') comidaViajesIncluido[m].viajes = parseFloat(r.amount) === 1;
        else allData[m].fixed[r.category] = r;
      });
 
      allData[m].variable = varR.data || [];
 
      // Deudas (cálculo local)
      const monthDate = new Date(parseInt(y), parseInt(mon) - 1, 1);
      debtCategories.forEach(cat => {
        let total = 0;
        allDebtsWithInstallments.filter(d => d.category_id === cat.id).forEach(debt => {
          const sd = debt.start_date.split('-').map(Number);
          const debtStart = new Date(sd[0], sd[1] - 1, sd[2]);
          const diff = (monthDate.getFullYear() - debtStart.getFullYear()) * 12 + (monthDate.getMonth() - debtStart.getMonth());
          if (diff >= 0 && diff < debt.num_installments) {
            const inst = (debt.installments || []).find(i => Number(i.month_number) === diff);
            if (inst && inst.paid !== true) total += parseFloat(inst.amount || 0);
          }
        });
        allData[m].deudasPorCategoria[cat.id] = total;
      });
      allData[m].deudas = Object.values(allData[m].deudasPorCategoria).reduce((s, v) => s + (v > 0 ? v : 0), 0);
 
      (mealsR.data || []).forEach(meal => {
        try { const d = JSON.parse(meal.data); if (d.me && d.personTotals?.[d.me]) { allData[m].comidas += d.personTotals[d.me]; allData[m].comidasCount++; } } catch(e) {}
      });
 
      (tripsR.data || []).forEach(trip => {
        try {
          const expenses = trip.expenses || []; const myName = trip.my_participant_name;
          if (!expenses.length || !myName) return;
          const pb = {};
          (trip.trip_participants || []).forEach(p => { pb[p.name] = { paid: 0, owes: 0 }; });
          expenses.forEach(exp => {
            const nI = exp.installments || 1;
            const pp = (exp.total / nI) / ((exp.participants || []).length || 1);
            if (pb[exp.paidByName] !== undefined) pb[exp.paidByName].paid += exp.total;
            for (let i = 0; i < nI; i++) {
              (exp.participants || []).forEach(pName => {
                const pay = exp.installmentPayments?.[i]?.find(x => x.participantId === pName);
                const amt = exp.customCuotaAmounts?.[pName]?.[i] ?? pp;
                if (!pay?.paid && pb[pName] !== undefined) pb[pName].owes += amt;
              });
            }
          });
          if (pb[myName] !== undefined) {
            const bal = Math.max(0, pb[myName].owes - pb[myName].paid);
            if (bal > 0) allData[m].viajesCount++;
            allData[m].viajes += bal;
          }
        } catch(e) {}
      });
    }));
  }
 
  function renderMonthTabs() {
    let html = '<div class="month-nav"><button class="nav-arrow" onclick="scrollMonths(-1)">‹</button><div class="month-tabs">';
    visibleMonths.forEach(m => {
      html += '<button class="month-tab ' + (m===selectedMonth?'active':'') + '" onclick="selectMonth(\'' + m + '\')">' + monthLabel(m) + '</button>';
    });
    html += '</div><button class="nav-arrow" onclick="scrollMonths(1)">›</button></div>';
    const tnav = document.getElementById('top-month-nav');
    if (tnav) tnav.innerHTML = html;
    const hdr = document.querySelector('.table-header');
    if (hdr) hdr.innerHTML = '<span class="table-title">💵 Flujo de Caja — ' + monthLabel(selectedMonth) + '</span>';
  }
 
  function scrollMonths(dir) {
    const idx = allMonths.indexOf(selectedMonth);
    const newIdx = Math.max(0, Math.min(allMonths.length-1, idx + dir));
    selectedMonth = allMonths[newIdx];
    initVisibleMonths();
    renderMonthTabs();
    loadAll().then(() => renderTable());
  }
 
  async function selectMonth(m) {
    selectedMonth = m;
    renderMonthTabs();
    await loadAll();
    renderTable();
  }
 
  window.addEventListener('resize', () => {
    if (window.innerWidth <= 600) applyMobileTableLayout();
  });
 
  function renderTable() {
    if (!selectedMonth || !allData[selectedMonth]) return;
   
    const d = allData[selectedMonth];
    const income = (d.income || []).reduce((s,r) => s + parseFloat(r.amount), 0);
    const fixed = fixedCategories.reduce((s, cat) => s + parseFloat(d.fixed[cat]?.amount || 0), 0);
    const variable = (d.variable || []).reduce((s,r) => s + parseFloat(r.amount), 0);
    const comidasGastoResumen = (comidaViajesIncluido[selectedMonth]?.comidas ?? false) ? d.comidas : 0;
    const viajesGastoResumen = (comidaViajesIncluido[selectedMonth]?.viajes ?? false) ? d.viajes : 0;
    const egreso = fixed + variable + d.deudas + comidasGastoResumen + viajesGastoResumen;
    const saldo = income - egreso;
   
    document.getElementById('card-ingresos').textContent = formatNum(income);
    document.getElementById('card-egresos').textContent = formatNum(egreso);
    const cs = document.getElementById('card-saldo');
    cs.textContent = formatNum(saldo);
    cs.className = 'sum-value ' + (saldo > 0 ? 'green' : saldo > -100000 ? 'yellow' : 'red');
    const varEl = document.getElementById('card-var-total');
    if (varEl) varEl.textContent = formatNum(variable);
    const infoEl = document.getElementById('card-var-info');
    if (infoEl) infoEl.style.display = variable > 0 ? 'inline' : 'none';
 
    let html = '<div class="table-header"><span class="table-title">💵 Flujo de Caja — ' + monthLabel(selectedMonth) + '</span></div><table data-sel-col="' + (visibleMonths.indexOf(selectedMonth) + 2) + '"><tbody>';
   
    // Headers
    html += '<tr class="header-row"><td>CATEGORÍA</td>';
    visibleMonths.forEach(m => {
      html += '<td style="' + (m===selectedMonth?'background:#003d99;color:white;':'') + '">' + monthLabel(m) + '</td>';
    });
    html += '</tr>';
   
    // INGRESOS
    html += '<tr class="sec-header"><td colspan="' + (visibleMonths.length+1) + '"><span style="letter-spacing:3px;">💰 INGRESOS</span> <button onclick="toggleIncomeForm()" title="Agregar ingreso" style="margin-left:8px;padding:1px 7px;background:#16a34a;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700;line-height:1.4;">+</button></td></tr>';
    const maxInc = Math.max(...visibleMonths.map(m => (allData[m].income || []).length || 0), 0);
    for (let i = 0; i < maxInc; i++) {
      html += '<tr><td></td>';
      visibleMonths.forEach(m => {
        const inc = (allData[m].income || [])[i];
        if (inc) {
          const escapedDesc = inc.description.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
          html += '<td style="text-align:right;color:#16a34a;position:relative;">';
          html += '<button class="rename-btn" style="position:absolute;left:4px;top:50%;transform:translateY(-50%);margin:0;" onclick="startEditIncome(\'' + inc.id + '\',\'' + escapedDesc + '\',' + inc.amount + ',this.closest(\'td\'))" title="Editar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>';
          html += '<button class="rename-btn del-btn" style="position:absolute;left:28px;top:50%;transform:translateY(-50%);margin:0;" onclick="deleteIncome(\'' + inc.id + '\')" title="Eliminar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>';
          html += '<strong>' + esc(inc.description) + '</strong><br/>' + formatNum(inc.amount);
          html += '</td>';
        } else {
          html += '<td></td>';
        }
      });
      html += '</tr>';
    }
    // Fila de agregar ingreso (al final)
    html += '<tr id="income-form-row" style="display:none;"><td></td>';
    visibleMonths.forEach(m => {
      if (m === selectedMonth) {
        html += '<td style="text-align:right;padding:6px 14px;">';
        html += '<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">';
        html += '<input id="inc-desc" type="text" placeholder="Nombre" style="background:#f0fff8;border:1px solid #10b981;border-radius:4px;padding:2px 6px;font-size:12px;font-family:Poppins;color:#001a4d;width:120px;text-align:right;" onkeydown="if(event.key===\'Enter\'){document.getElementById(\'inc-monto\').focus();document.getElementById(\'inc-monto\').select();}if(event.key===\'Escape\')toggleIncomeForm();" />';
        html += '<input id="inc-monto" type="number" placeholder="Monto" min="0" style="background:#f0fff8;border:1px solid #10b981;border-radius:4px;padding:2px 6px;font-size:12px;font-family:Poppins;color:#16a34a;width:120px;text-align:right;" onblur="saveIncomeAuto()" onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\')toggleIncomeForm();" />';
        html += '</div></td>';
      } else {
        html += '<td></td>';
      }
    });
    html += '</tr>';
   
    // Ingresos total
    html += '<tr class="total-row"><td>Total Ingresos</td>';
    visibleMonths.forEach(m => {
      const tot = (allData[m].income || []).reduce((s,r) => s + parseFloat(r.amount), 0);
      html += '<td style="text-align:right;color:#16a34a;"><strong>' + formatNum(tot) + '</strong></td>';
    });
    html += '</tr>';
   
    // GASTOS FIJOS
    html += '<tr class="sec-header"><td colspan="' + (visibleMonths.length+1) + '">🏠 GASTOS FIJOS <button onclick="addFixedCategory()" title="Agregar gasto fijo" style="margin-left:8px;padding:1px 7px;background:#16a34a;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700;line-height:1.4;">+</button></td></tr>';
    fixedCategories.forEach((cat, catIdx) => {
      if (cat === 'Arriendo/Dividendo') {
        // Fila principal con botón +
        html += '<tr><td>' + cat + ' <button onclick="toggleArriendoForm()" title="Agregar subcategoría" style="margin-left:6px;padding:1px 7px;background:#003d99;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700;line-height:1.4;">+</button></td>';
        visibleMonths.forEach(m => {
          const val = parseFloat(allData[m].fixed[cat]?.amount || 0);
          html += '<td class="input-cell"><input type="text" value="' + (val>0?formatNum(val):'') + '" onkeydown="if(event.key===\'Enter\') this.blur();" onblur="saveFixed(\'' + cat + '\',\'' + m + '\',this.value)" /></td>';
        });
        html += '</tr>';
        // Fila inline para agregar subcategoría - mismo estilo que inputs de la tabla
        html += '<tr id="arriendo-form-row" style="display:none;">';

  function applyMobileTableLayout() {
    if (window.innerWidth > 600) return;
    const selIdx = visibleMonths.indexOf(selectedMonth);
    const table = document.querySelector('#cashFlowSection table');
    if (!table) return;
    table.querySelectorAll('tr').forEach(row => {
      const cells = row.querySelectorAll('td');
      if (cells.length === 1 && cells[0].hasAttribute('colspan')) {
        cells[0].setAttribute('colspan', '2');
      } else {
        cells.forEach((td, i) => {
          if (i > 0 && i !== selIdx + 1) td.style.display = 'none';
          else td.style.display = '';
        });
      }
    });
  }

  function saveFixedCategoriesList() {

  function addFixedCategory() {
    let newName = '-';
    let counter = 2;
    while (fixedCategories.includes(newName)) { newName = '-' + counter++; }
    fixedCategories.push(newName);
    saveFixedCategoriesList();
    renderTable();
    const newIdx = fixedCategories.length - 1;
    setTimeout(() => startRenameFixed(newIdx, newName), 0);

  function startRenameFixed(catIdx, catName) {
    const span = document.getElementById('fixed-label-' + catIdx);
    if (!span) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = catName;
    input.style.cssText = 'background:#f0fff8;border:1px solid #10b981;border-radius:4px;padding:2px 6px;font-size:12px;font-family:Poppins;color:#001a4d;width:140px;';
    let done = false;
    input.onblur = () => { if (!done) { done = true; saveRenameFixed(catName, input.value.trim()); } };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { done = true; renderTable(); }
    };
    span.replaceWith(input);
    input.focus();
    input.select();
  }
 
  async function saveRenameFixed(oldName, newName) {
    if (!newName || newName === oldName) { renderTable(); return; }
    const idx = fixedCategories.indexOf(oldName);
    if (idx === -1) { renderTable(); return; }
    fixedCategories[idx] = newName;
    saveFixedCategoriesList();
    try {
      await mySupabase.from('monthly_fixed_expenses')
        .update({ category: newName })
        .eq('user_id', currentUser.id)
        .eq('category', oldName);
    } catch(e) { console.warn(e); }
    Object.keys(allData).forEach(m => {
      if (allData[m].fixed[oldName] !== undefined) {
        allData[m].fixed[newName] = { ...allData[m].fixed[oldName], category: newName };
        delete allData[m].fixed[oldName];
      }
    });
    renderTable();
  }

      '<input type="number" value="' + currentAmount + '" style="background:#f0fff8;border:1px solid #10b981;border-radius:4px;padding:2px 6px;font-size:12px;font-family:Poppins;color:#16a34a;width:120px;text-align:right;" />' +

  async function saveFixed(cat, m, val) {
    const amt = parseAmount(val);
    invalidateCache([m]);
    const idx = allMonths.indexOf(m);
    const futureMonths = idx !== -1 ? allMonths.slice(idx + 1) : [];
 
    // 1. Actualizar estado local del mes editado
    if (allData[m]?.fixed !== undefined) {
      allData[m].fixed[cat] = { ...(allData[m].fixed[cat] || {}), amount: amt, category: cat };
    }
 
    // 2. Actualizar meses futuros visibles en estado local (sin consulta)
    futureMonths.forEach(fm => {
      if (allData[fm]?.fixed !== undefined && !allData[fm].fixed[cat]?.is_manual_override) {
        allData[fm].fixed[cat] = { ...(allData[fm].fixed[cat] || {}), amount: amt };
      }
    });
 
    renderTable(); // Re-render instantáneo con datos locales
 
    // 3. Guardar en Supabase — primero los meses sin datos locales se consultan EN PARALELO
    try {
      const nonLocalMonths = futureMonths.filter(fm => !allData[fm]?.fixed);
      let remoteOverrides = {};
      if (nonLocalMonths.length > 0) {
        const checks = await Promise.all(
          nonLocalMonths.map(fm =>
            mySupabase.from('monthly_fixed_expenses')
              .select('is_manual_override')
              .eq('user_id', currentUser.id).eq('month', fm).eq('category', cat)
              .maybeSingle()
          )
        );
        nonLocalMonths.forEach((fm, i) => { remoteOverrides[fm] = checks[i].data; });
      }
 
      // 4. Todos los upserts (mes actual + futuros no-manuales) EN PARALELO
      await Promise.all([
        mySupabase.from('monthly_fixed_expenses').upsert(
          { user_id: currentUser.id, month: m, category: cat, amount: amt, is_manual_override: true },
          { onConflict: 'user_id,month,category' }
        ),
        ...futureMonths.map(fm => {
          const isManual = allData[fm]?.fixed
            ? allData[fm].fixed[cat]?.is_manual_override
            : remoteOverrides[fm]?.is_manual_override;
          if (!isManual) {
            return mySupabase.from('monthly_fixed_expenses').upsert(
              { user_id: currentUser.id, month: fm, category: cat, amount: amt, is_manual_override: false },
              { onConflict: 'user_id,month,category' }
            );
          }
        }).filter(Boolean)
      ]);
 
      rgToast('✓ Guardado');
    } catch(e) { rgToast('Error al guardar', false); }
  }

    if (!items.length) return;

    const grouped = {};

      grouped[cat].push(r);
    });
 
    let body = '';
    Object.keys(grouped).forEach(cat => {
      const catTotal = grouped[cat].reduce((s, r) => s + parseFloat(r.amount), 0);
      body += '<div style="margin-bottom:10px;">';
      body += '<div style="font-size:11px;font-weight:700;color:#446;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">' + cat + '</div>';
      grouped[cat].forEach(r => {
        body += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f4ff;gap:8px;">';
        body += '<span style="color:#334;flex:1;">' + (r.description || cat) + '</span>';
        body += '<span style="color:#dc2626;font-weight:600;white-space:nowrap;">' + formatNum(r.amount) + '</span>';
        body += '<button onclick="deleteVarItem(\'' + r.id + '\')" title="Eliminar" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0;line-height:1;flex-shrink:0;">&times;</button>';
        body += '</div>';
      });
      if (grouped[cat].length > 1) {
        body += '<div style="text-align:right;font-size:11px;color:#10b981;font-weight:700;margin-top:2px;">Sub: ' + formatNum(catTotal) + '</div>';
      }
      body += '</div>';
    });
 
    document.getElementById('var-popup-body').innerHTML = body;
 
    // position:fixed — coords relativas al viewport, sin scrollY
    popup.style.visibility = 'hidden';
    popup.style.display = 'block';
    const rect = el.getBoundingClientRect();
    const popW = popup.offsetWidth;
    const popH = popup.offsetHeight;
    let left = rect.left + rect.width / 2 - popW / 2;
    if (left < 8) left = 8;
    if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
    let top = rect.top - popH - 10;
    if (top < 8) top = rect.bottom + 8;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.visibility = 'visible';
  }
 
  async function deleteVarItem(id) {
    try {
      await mySupabase.from('monthly_variable_expenses').delete().eq('id', id);
      closeVarPopup();
      await loadAll();
      renderTable();
      rgToast('✓ Gasto eliminado');
    } catch(e) { rgToast('Error al eliminar gasto', false); }
  }
 
  function closeVarPopup() {
    document.getElementById('var-detail-popup').style.display = 'none';
  }
 
  document.addEventListener('click', (e) => {
    const popup = document.getElementById('var-detail-popup');
    if (popup && popup.style.display !== 'none' && !popup.contains(e.target) && !e.target.closest('[onclick*="showVarDetail"]')) {
      popup.style.display = 'none';
    }
  });
 
  function toggleIncomeForm() {
    const row = document.getElementById('income-form-row');
    if (!row) return;
    const visible = row.style.display !== 'none';
    row.style.display = visible ? 'none' : 'table-row';
    if (!visible) {
      document.getElementById('inc-desc').value = '';
      document.getElementById('inc-monto').value = '';
      document.getElementById('inc-desc').focus();
    }
  }
 
  function saveIncomeAuto() {
    const desc = document.getElementById('inc-desc')?.value.trim();
    const amt = parseAmount(document.getElementById('inc-monto')?.value);
    if (!desc || !amt) { toggleIncomeForm(); return; }
    saveIncome(desc, amt);
  }
 
  function addIncome() { toggleIncomeForm(); }
 
  async function saveIncome(desc, amt) {
    invalidateCache([selectedMonth]);
    try {
      await mySupabase.from('monthly_income').insert({ user_id: currentUser.id, month: selectedMonth, description: desc, amount: amt });
      rgToast('✓ Ingreso guardado');
    } catch(e) { rgToast('Error al guardar ingreso', false); }
    await loadAll();
    renderTable();
  }
 
  async function saveVarQuick() {
    const det = document.getElementById('qdetail').value.trim();
    const mnt = parseFloat(document.getElementById('qmonto').value);
    if (!mnt) return;
    try { await mySupabase.from('monthly_variable_expenses').insert({ user_id: currentUser.id, month: selectedMonth, category: 'General', description: det || 'Gasto', amount: mnt }); } catch(e) {}
    document.getElementById('qdetail').value = '';
    document.getElementById('qmonto').value = '';
    await loadAll();
    renderTable();
  }
 
  async function saveVarFromCard() {
    const det = document.getElementById('card-var-detail').value.trim();
    const mnt = parseFloat(document.getElementById('card-var-monto').value);
    if (!mnt) return;
    try { await mySupabase.from('monthly_variable_expenses').insert({ user_id: currentUser.id, month: selectedMonth, category: 'General', description: det || 'Gasto', amount: mnt }); } catch(e) {}
    document.getElementById('card-var-detail').value = '';
    document.getElementById('card-var-monto').value = '';
    await loadAll();
    renderTable();
  }
 
  function showVarDetailCard() {
    const el = document.getElementById('card-var-info');
    if (el) showVarDetail(selectedMonth, el);
  }
 
  function openConfig() {
    document.getElementById('configUF').value = ufValue;
    document.getElementById('configModal').style.display = 'flex';
  }
 
  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
  }
 
  async function saveUF() {
    ufValue = parseFloat(document.getElementById('configUF').value) || 38000;
    document.getElementById('card-uf').textContent = formatNum(ufValue);
    try { await mySupabase.from('user_config').upsert({ user_id: currentUser.id, uf_value: ufValue, updated_at: new Date().toISOString() }, { onConflict: 'user_id' }); } catch(e) {}
    alert('Valor UF actualizado ✓');
  }
 
  async function loadComidaViajesIncluido() {
    comidaViajesIncluido = {};
    for (const m of visibleMonths) {
      try {
        const { data: fix } = await mySupabase
          .from('monthly_fixed_expenses')
          .select('category, amount')
          .eq('user_id', currentUser.id)
          .eq('month', m)
          .in('category', ['__comidas_include', '__viajes_include']);
        const cRow = (fix || []).find(r => r.category === '__comidas_include');
        const vRow = (fix || []).find(r => r.category === '__viajes_include');
        comidaViajesIncluido[m] = {
          comidas: cRow ? parseFloat(cRow.amount) === 1 : false,
          viajes:  vRow ? parseFloat(vRow.amount) === 1 : false
        };
      } catch(e) {
        comidaViajesIncluido[m] = { comidas: false, viajes: false };
      }
    }
  }
 
  async function toggleIncluir(m, tipo, checked) {
    if (!comidaViajesIncluido[m]) comidaViajesIncluido[m] = { comidas: false, viajes: false };
    comidaViajesIncluido[m][tipo] = checked;
    const cat = tipo === 'comidas' ? '__comidas_include' : '__viajes_include';
    try {
      await mySupabase.from('monthly_fixed_expenses').upsert({
        user_id: currentUser.id,
        month: m,
        category: cat,
        amount: checked ? 1 : 0,
        is_manual_override: true
      }, { onConflict: 'user_id,month,category' });
    } catch(e) { console.error('Error guardando estado:', e); }
    renderTable();
  }
 
  async function handleLogout() {
    try { await mySupabase.auth.signOut(); } catch(e) {}
    window.location.href = 'Final.html';
  }
</script>
