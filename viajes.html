<html lang="es">
<head>

        .logo {

            text-decoration: none;
            display: flex;
            align-items: stretch;
            align-self: stretch;
            margin: -20px 0 -20px -40px;
        }

        .back-btn {
            display: inline-flex;

            gap: 6px;

            color: #0066cc;
            border: 2px solid #99ccff;

        .back-btn:hover {

        .navbar-right {

            align-items: center;
            gap: 20px;
        }

        }

        .logout-btn:hover {

            font-size: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

        .page-header h1 {
            font-size: 36px;
            color: #001a4d;

        .btn-add-trip {

            font-weight: 600;

        .btn-add-trip:hover {

        .modal {
            display: none;

            left: 0;

        .modal-header {

            font-weight: 700;

        .form-group {

            color: white;
            border: none;

            color: white;

            border-radius: 4px;

        .btn-add-participant:hover {

        }

        .modal-buttons {

        .btn-create {

            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;

        .btn-create:hover {

        .btn-cancel {
            flex: 1;

            background: #e6e6e6;

            border: none;

        .btn-cancel:hover {

        /* LISTA DE VIAJES */

        .trip-title {

        .btn-edit-trip:hover {

        .trip-stats {

        .stat {

        .stat-label {

        .stat-value {

        .trip-actions {
            display: flex;

        .btn-view {

        .btn-delete {

            font-weight: 600;
            cursor: pointer;

        }

        .btn-delete:hover {

        }

        .empty-state {

        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .page-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .trip-stats {
                flex-wrap: wrap;
            }

            .navbar {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar">

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="container">

            <div style="display:flex;align-items:center;gap:20px;">

    <!-- MODAL PARA CREAR VIAJE -->
    <div class="modal" id="createTripModal">

            <div class="modal-header">Crear Nuevo Viaje</div>

            </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const sbUrl = 'https://vfqjcyecqecfrevmnivy.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWpjeWVjcWVjZnJldm1uaXZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NTc3NTQsImV4cCI6MjA5ODUzMzc1NH0.dNdouTXa3p1ctM6IdJXm0U_bqopEFAh5NoJCeYNDdzk';
        const mySupabase = supabase.createClient(sbUrl, sbKey);

        let trips = [];

        // Cargar viajes de Supabase
        async function loadTrips() {
            try {
                const user = await mySupabase.auth.getUser();
                if (!user.data.user) {
                    trips = [];
                    return;
                }

                const { data, error } = await mySupabase
                    .from('trips')
                    .select(`
                        id,
                        name,
                        description,
                        my_participant_name,
                        expenses,
                        created_at,
                        trip_participants (id, name)
                    `)
                    .eq('user_id', user.data.user.id)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error cargando viajes:', error);
                    trips = [];
                    return;
                }

                // Mapear datos de Supabase al formato de la app
                trips = (data || []).map(trip => ({
                    id: trip.id,
                    name: trip.name,
                    description: trip.description,
                    participants: trip.trip_participants || [],
                    expenses: Array.isArray(trip.expenses) ? trip.expenses : [],
                    createdAt: trip.created_at,
                    myParticipantName: trip.my_participant_name
                }));

                console.log('Viajes cargados:', trips.length);
            } catch (e) {
                console.error('Error en loadTrips:', e);
                trips = [];
            }
        }

        // Guardar viaje en Supabase
        async function saveTrip(trip) {
            try {
                const user = await mySupabase.auth.getUser();
                if (!user.data.user) return;

                // Insertar viaje
                const { data: newTrip, error: tripError } = await mySupabase
                    .from('trips')
                    .insert([{
                        user_id: user.data.user.id,
                        name: trip.name,
                        description: trip.description,
                        my_participant_name: trip.myParticipantName,
                        created_at: trip.createdAt
                    }])
                    .select()
                    .single();

                if (tripError) {
                    console.error('Error guardando viaje:', tripError);
                    return null;
                }

                // Insertar participantes
                if (trip.participants && trip.participants.length > 0) {
                    const participants = trip.participants.map(p => ({
                        trip_id: newTrip.id,
                        name: p.name
                    }));

                    const { error: participantError } = await mySupabase
                        .from('trip_participants')
                        .insert(participants);

                    if (participantError) {
                        console.error('Error guardando participantes:', participantError);
                    }
                }

                console.log('Viaje guardado:', newTrip.id);
                return newTrip.id;
            } catch (e) {
                console.error('Error en saveTrip:', e);
                return null;
            }
        }

        // Actualizar viaje en Supabase
        async function updateTrip(trip) {
            try {
                const user = await mySupabase.auth.getUser();
                if (!user.data.user) return false;

                // Actualizar viaje
                const { error: updateError } = await mySupabase
                    .from('trips')
                    .update({
                        name: trip.name,
                        description: trip.description
                    })
                    .eq('id', trip.id)
                    .eq('user_id', user.data.user.id);

                if (updateError) {
                    console.error('Error actualizando viaje:', updateError);
                    return false;
                }

                // Eliminar participantes antiguos
                await mySupabase
                    .from('trip_participants')
                    .delete()
                    .eq('trip_id', trip.id);

                // Insertar nuevos participantes
                if (trip.participants && trip.participants.length > 0) {
                    const participants = trip.participants.map(p => ({
                        trip_id: trip.id,
                        name: p.name
                    }));

                    const { error: participantError } = await mySupabase
                        .from('trip_participants')
                        .insert(participants);

                    if (participantError) {
                        console.error('Error actualizando participantes:', participantError);
                    }
                }

                console.log('Viaje actualizado:', trip.id);
                return true;
            } catch (e) {
                console.error('Error en updateTrip:', e);
                return false;
            }
        }

        // Eliminar viaje de Supabase
        async function deleteTrip(tripId) {
            try {
                const user = await mySupabase.auth.getUser();
                if (!user.data.user) return false;

                const { error } = await mySupabase
                    .from('trips')
                    .delete()
                    .eq('id', tripId)
                    .eq('user_id', user.data.user.id);

                if (error) {
                    console.error('Error eliminando viaje:', error);
                    return false;
                }

                console.log('Viaje eliminado:', tripId);
                return true;
            } catch (e) {
                console.error('Error en deleteTrip:', e);
                return false;
            }
        }

        // Guardar (usado por compatibilidad)
        function saveTrips() {
            // Aquí podría sincronizarse si es necesario
        }

        let currentUserName = '';

        // VERIFICAR SESIÓN
        mySupabase.auth.getSession().then(({ data }) => {
            if (data.session) {
                const _u = data.session.user;
                const _meta = _u.user_metadata || {};
                currentUserName = (_meta.full_name || ((_meta.nombre || '') + ' ' + (_meta.apellido || '')).trim()) || _u.email.split('@')[0];
                document.getElementById('welcomeText').textContent = `¡Bienvenido, ${currentUserName}!`;
                document.getElementById('profileIcon').textContent = currentUserName.charAt(0).toUpperCase();
                
                // Cargar viajes de Supabase
                loadTrips().then(() => renderTrips());
            } else {
                goBack();
            }
        });

        // ABRIR MODAL DE CREAR VIAJE
        function openCreateTripModal() {
            document.getElementById('createTripModal').classList.add('active');
        }

        // CERRAR MODAL
        function closeCreateTripModal() {
            document.getElementById('createTripModal').classList.remove('active');
            document.getElementById('tripName').value = '';
            document.getElementById('tripDescription').value = '';
            document.getElementById('participantsContainer').innerHTML = `
                <div class="participant-input">
                    <input type="text" placeholder="Nombre del participante" class="participant-input-field">
                    <button class="btn-remove" onclick="removeParticipantInput(this)">✕</button>
                </div>
            `;
        }

        // AGREGAR CAMPO DE PARTICIPANTE
        function addParticipantInput() {
            const container = document.getElementById('participantsContainer');
            const div = document.createElement('div');
            div.className = 'participant-input';
            div.innerHTML = `
                <input type="text" placeholder="Nombre del participante" class="participant-input-field">
                <button class="btn-remove" onclick="removeParticipantInput(this)">✕</button>
            `;
            container.appendChild(div);
        }

        // REMOVER CAMPO DE PARTICIPANTE
        function removeParticipantInput(btn) {
            btn.parentElement.remove();
        }

        // CREAR VIAJE
        let tempTripData = null; // Almacenar datos temporales del viaje durante creación

        function createTrip() {
            const tripName = document.getElementById('tripName').value;
            const tripDescription = document.getElementById('tripDescription').value;
            const participantInputs = document.querySelectorAll('.participant-input-field');
            const participants = [];

            participantInputs.forEach(input => {
                if (input.value.trim()) {
                    participants.push({
                        id: String(Date.now() + Math.random()),
                        name: input.value.trim()
                    });
                }
            });

            if (!tripName || participants.length === 0) {
                alert('Por favor ingresa un nombre y al menos un participante');
                return;
            }

            // Guardar temporalmente los datos y mostrar modal de selección
            tempTripData = {
                name: tripName,
                description: tripDescription,
                participants: participants
            };

            closeCreateTripModal();
            openSelectParticipantModal(participants);
        }

        function openSelectParticipantModal(participants) {
            const container = document.getElementById('participantSelectContainer');
            container.innerHTML = '';

            participants.forEach(participant => {
                const btn = document.createElement('button');
                btn.className = 'btn-create';
                btn.style.cssText = 'width: 100%; padding: 15px; text-align: left; justify-content: flex-start;';
                btn.textContent = `👤 ${participant.name}`;
                btn.onclick = () => finalizeTripCreation(participant.name);
                container.appendChild(btn);
            });

            document.getElementById('selectParticipantModal').classList.add('active');
        }

        function finalizeTripCreation(myParticipantName) {
            if (!tempTripData) return;

            const trip = {
                id: undefined,  // Se generará en Supabase
                name: tempTripData.name,
                description: tempTripData.description,
                participants: tempTripData.participants,
                expenses: [],
                createdAt: new Date().toISOString(),
                createdBy: currentUserName,
                myParticipantName: myParticipantName
            };

            // Guardar en Supabase
            saveTrip(trip).then(newId => {
                if (newId) {
                    trip.id = newId;
                    trips.push(trip);
                    renderTrips();
                    closeSelectParticipantModal();
                    tempTripData = null;
                } else {
                    alert('Error al guardar el viaje');
                }
            });
        }

        function closeSelectParticipantModal() {
            document.getElementById('selectParticipantModal').classList.remove('active');
        }

        // VARIABLES PARA EDICIÓN DE VIAJE
        let editingTripId = null;

        // ABRIR MODAL DE EDITAR VIAJE
        function openEditTripModal(tripId) {
            editingTripId = tripId;
            const trip = trips.find(t => t.id === tripId);
            
            if (!trip) return;

            // Llenar los datos del viaje
            document.getElementById('editTripName').value = trip.name;
            document.getElementById('editTripDescription').value = trip.description || '';

            // Llenar participantes
            const editParticipantsContainer = document.getElementById('editParticipantsContainer');
            editParticipantsContainer.innerHTML = '';
            trip.participants.forEach(participant => {
                const div = document.createElement('div');
                div.className = 'participant-input';
                div.innerHTML = `
                    <input type="text" placeholder="Nombre del participante" class="participant-input-field" value="${participant.name}">
                    <button class="btn-remove" onclick="removeEditParticipantInput(this)">✕</button>
                `;
                editParticipantsContainer.appendChild(div);
            });

            // Mostrar modal
            document.getElementById('editTripModal').classList.add('active');
        }

        // CERRAR MODAL DE EDITAR VIAJE
        function closeEditTripModal() {
            document.getElementById('editTripModal').classList.remove('active');
            editingTripId = null;
        }

        // AGREGAR PARTICIPANTE EN EDICIÓN
        function addEditParticipantInput() {
            const container = document.getElementById('editParticipantsContainer');
            const div = document.createElement('div');
            div.className = 'participant-input';
            div.innerHTML = `
                <input type="text" placeholder="Nombre del participante" class="participant-input-field">
                <button class="btn-remove" onclick="removeEditParticipantInput(this)">✕</button>
            `;
            container.appendChild(div);
        }

        // REMOVER PARTICIPANTE EN EDICIÓN
        function removeEditParticipantInput(btn) {
            btn.parentElement.remove();
        }

        // GUARDAR CAMBIOS DEL VIAJE
        function saveEditedTrip() {
            if (editingTripId === null) return;

            const tripName = document.getElementById('editTripName').value;
            const tripDescription = document.getElementById('editTripDescription').value;
            const participantInputs = document.querySelectorAll('#editParticipantsContainer .participant-input-field');
            const participants = [];

            participantInputs.forEach(input => {
                if (input.value.trim()) {
                    participants.push({
                        id: String(Date.now() + Math.random()),
                        name: input.value.trim()
                    });
                }
            });

            if (!tripName || participants.length === 0) {
                alert('Por favor ingresa un nombre y al menos un participante');
                return;
            }

            // Actualizar el viaje en Supabase
            const tripIndex = trips.findIndex(t => t.id === editingTripId);
            if (tripIndex !== -1) {
                const trip = trips[tripIndex];
                trip.name = tripName;
                trip.description = tripDescription;
                trip.participants = participants;

                updateTrip(trip).then(success => {
                    if (success) {
                        renderTrips();
                        closeEditTripModal();
                    } else {
                        alert('Error al actualizar el viaje');
                    }
                });
            }
        }

        // RENDERIZAR VIAJES
        function renderTrips() {
            const list = document.getElementById('tripsList');
            
            if (trips.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✈️</div>
                        <div class="empty-state-text">No tienes viajes registrados</div>
                        <p style="color: #ccc; font-size: 14px;">Crea tu primer viaje para comenzar</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            trips.forEach(trip => {
                const totalExpense = trip.expenses.reduce((sum, exp) => sum + exp.total, 0);
                const card = document.createElement('div');
                card.className = 'trip-card';
                card.innerHTML = `
                    <div class="trip-header">
                        <div class="trip-title-container">
                            <div class="trip-title">${trip.name}</div>
                            <button class="btn-edit-trip" onclick="openEditTripModal('${trip.id}')" title="Editar viaje">✏️</button>
                            <button class="btn-edit-trip" onclick="compartirTrip('${trip.id}')" id="shareBtn-${trip.id}" title="Compartir viaje">📤</button>
                        </div>
                    </div>
                    <div class="trip-stats">
                        <div class="stat">
                            <span class="stat-label">Participantes:</span>
                            <span class="stat-value">${trip.participants.length}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Gastos:</span>
                            <span class="stat-value">${trip.expenses.length}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Total:</span>
                            <span class="stat-value">$${_fmtNum(totalExpense)}</span>
                        </div>
                    </div>
                    ${trip.description ? `<p style="color: #666; margin-bottom: 15px;">${trip.description.replace(/"/g, '&quot;')}</p>` : ''}
                    <div class="trip-actions">
                        <button class="btn-view" onclick="viewTrip('${trip.id}')">Ver Detalles</button>
                        <button class="btn-delete" onclick="deleteTripUI('${trip.id}')">Eliminar</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // VER DETALLES DEL VIAJE
        function viewTrip(tripId) {
            // Guardar el viaje seleccionado en localStorage
            const trip = trips.find(t => t.id === tripId);
            localStorage.setItem('currentTrip', JSON.stringify(trip));
            window.location.href = 'viaje-detalle.html';
        }

        // ELIMINAR VIAJE
        function deleteTripUI(tripId) {
            if (confirm('¿Estás seguro de que deseas eliminar este viaje?')) {
                deleteTrip(tripId).then(success => {
                    if (success) {
                        trips = trips.filter(t => t.id !== tripId);
                        renderTrips();
                    } else {
                        alert('Error al eliminar el viaje');
                    }
                });
            }
        }

        // VOLVER AL DASHBOARD
        function goBack() {
            window.location.href = 'Final.html';
        }

        // LOGOUT
        async function handleLogout() {
            await mySupabase.auth.signOut();
            goBack();
        }

        // CARGAR VIAJES AL INICIAR
        loadTrips().then(() => {
            renderTrips();
            // Sincronizar cambios desde viaje-detalle.html si existen
            const currentTrip = localStorage.getItem('currentTrip');
            if (currentTrip) {
                const updatedTrip = JSON.parse(currentTrip);
                const index = trips.findIndex(t => t.id === updatedTrip.id);
                if (index !== -1) {
                    trips[index] = updatedTrip;
                    updateTrip(updatedTrip);
                }
                localStorage.removeItem('currentTrip');
            }
        });

        /* ======= COMPARTIR VIAJE ======= */
        function _fmtNum(num) {
            return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }
        function _addMonths(date, months) {
            const d = new Date(date); d.setMonth(d.getMonth() + months);
            return d.toISOString().split('T')[0];
        }
        function _monthName(date) {
            return new Date(date).toLocaleDateString('es-ES', { month: 'short', year: '2-digit' });
        }

        function _buildMatrix(trip) {
            const names = trip.participants.map(p => p.name);
            const n = names.length;
            const m = Array.from({ length: n }, () => Array(n).fill(0));
            trip.expenses.forEach(exp => {
                const inst = exp.installments || 1;
                const paid = exp.paidByName || '';
                const pppi = (exp.total / inst) / (exp.participants.length || 1);
                for (let k = 0; k < inst; k++) {
                    exp.participants.forEach(pName => {
                        if (pName === paid) return;
                        const payment = exp.installmentPayments?.[k]?.find(pm => pm.participantId === pName);
                        let amt = pppi;
                        if (exp.customCuotaAmounts?.[pName]?.[k] !== undefined) amt = exp.customCuotaAmounts[pName][k];
                        if (!payment || !payment.paid) {
                            const di = names.indexOf(pName), ci = names.indexOf(paid);
                            if (di >= 0 && ci >= 0) m[di][ci] += amt;
                        }
                    });
                }
            });
            for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
                const ij = m[i][j], ji = m[j][i];
                if (ij >= ji) { m[i][j] = ij - ji; m[j][i] = 0; }
                else           { m[j][i] = ji - ij; m[i][j] = 0; }
            }
            return { participants: names, matrix: m };
        }

        function _buildContent(trip) {
            const { participants, matrix } = _buildMatrix(trip);
            const n = participants.length;
            const navy = '#001a4d', blue = '#0066cc', lP = '#f0e6ff', lB = '#e6f0ff', bd = '#d0d8f0';
            const rain = ['#ff0000','#ff7f00','#ffdd00','#00aa00','#0066cc','#7f00ff'];
            let h = `<div style="font-family:'Poppins',sans-serif;background:#f8f9ff;padding:20px 24px;color:${navy};width:760px;box-sizing:border-box;">`;

            // ENCABEZADO
            const totalExp = trip.expenses.reduce((s, e) => s + e.total, 0);
            h += `<div style="background:white;border-radius:8px;padding:14px 16px;margin-bottom:12px;border-left:4px solid #ffaa00;">`;
            h += `<div style="font-size:17px;font-weight:700;margin-bottom:10px;">✈️ ${trip.name}</div>`;
            h += `<div style="display:flex;gap:8px;margin-bottom:10px;">`;
            h += `<div style="background:${lP};padding:6px 12px;border-radius:5px;"><div style="font-size:9px;color:#666;font-weight:600;text-transform:uppercase;">Participantes</div><div style="font-weight:700;color:${blue};font-size:13px;">${trip.participants.length}</div></div>`;
            h += `<div style="background:${lP};padding:6px 12px;border-radius:5px;"><div style="font-size:9px;color:#666;font-weight:600;text-transform:uppercase;">Gastos</div><div style="font-weight:700;color:${blue};font-size:13px;">${trip.expenses.length}</div></div>`;
            h += `</div>`;
            h += `<div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:6px;">Items</div>`;
            trip.expenses.forEach((exp, i) => {
                const c = rain[i % rain.length];
                h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;margin-bottom:3px;background:${lP};"><span style="display:flex;align-items:center;gap:6px;font-size:12px;"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c};"></span>${exp.name}</span><span style="font-weight:700;color:${blue};font-size:12px;">$${_fmtNum(exp.total)}</span></div>`;
            });
            h += `</div>`;

            // MATRIZ
            h += `<div style="background:white;border-radius:8px;padding:14px 16px;margin-bottom:12px;">`;
            h += `<div style="font-size:13px;font-weight:700;margin-bottom:10px;">📋 Matriz de Deudas</div>`;
            h += `<table style="border-collapse:collapse;font-size:11px;"><thead><tr>`;
            h += `<th rowspan="2" colspan="2" style="background:white;border:none;"></th>`;
            h += `<th colspan="${n}" style="background:${lB};color:${navy};padding:5px 8px;border:1px solid ${bd};text-align:center;font-weight:600;">Recibe</th>`;
            h += `</tr><tr>`;
            participants.forEach(name => { h += `<th style="background:${lP};color:${navy};padding:5px 8px;border:1px solid ${bd};text-align:center;white-space:nowrap;">${name}</th>`; });
            h += `</tr></thead><tbody>`;
            participants.forEach((row, i) => {
                h += `<tr>`;
                if (i === 0) h += `<td rowspan="${n}" style="text-align:center;font-weight:700;font-size:11px;background:${lP};color:${navy};padding:5px 4px;border:1px solid ${bd};vertical-align:middle;">P<br>a<br>g<br>a</td>`;
                h += `<td style="font-weight:600;background:${lP};color:${navy};padding:5px 8px;border:1px solid ${bd};white-space:nowrap;">${row}</td>`;
                participants.forEach((_, j) => {
                    if (i === j) { h += `<td style="background:#f5f5f5;color:#bbb;padding:5px 8px;border:1px solid ${bd};text-align:center;">—</td>`; }
                    else {
                        const amt = matrix[i][j];
                        h += amt > 0 ? `<td style="color:#cc4400;font-weight:600;padding:5px 8px;border:1px solid ${bd};text-align:center;">$${_fmtNum(amt)}</td>`
                                     : `<td style="color:#bbb;padding:5px 8px;border:1px solid ${bd};text-align:center;">$0</td>`;
                    }
                });
                h += `</tr>`;
            });
            h += `</tbody></table></div>`;

            // DETALLE
            h += `<div style="background:white;border-radius:8px;padding:14px 16px;">`;
            h += `<div style="font-size:13px;font-weight:700;margin-bottom:10px;">💰 Detalle de Gastos</div>`;
            trip.expenses.forEach((exp, idx) => {
                const inst = exp.installments || 1;
                const pppi = (exp.total / inst) / (exp.participants.length || 1);
                const col  = rain[idx % rain.length];
                h += `<div style="margin-bottom:14px;padding-left:10px;border-left:3px solid ${col};">`;
                h += `<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span style="font-weight:700;font-size:12px;">${exp.name}</span><span style="font-weight:700;color:${blue};font-size:12px;">$${_fmtNum(exp.total)}</span></div>`;
                h += `<div style="font-size:10px;color:#666;margin-bottom:6px;">Pagado por: <strong>${exp.paidByName}</strong> &nbsp;·&nbsp; ${inst > 1 ? inst + ' cuotas' : 'Pago único'} &nbsp;·&nbsp; Participantes: ${exp.participants.join(', ')}</div>`;
                h += `<table style="border-collapse:collapse;font-size:10px;width:100%;"><thead><tr>`;
                h += `<th style="background:${lB};color:${navy};padding:4px 7px;border:1px solid ${bd};text-align:left;white-space:nowrap;">Participante</th>`;
                h += `<th style="background:${lB};color:${navy};padding:4px 7px;border:1px solid ${bd};text-align:center;">Total</th>`;
                h += `<th style="background:${lB};color:${navy};padding:4px 7px;border:1px solid ${bd};text-align:center;">Pendiente</th>`;
                for (let i = 0; i < inst; i++) h += `<th style="background:${lB};color:${navy};padding:4px 7px;border:1px solid ${bd};text-align:center;white-space:nowrap;">${_monthName(_addMonths(exp.date, i))}</th>`;
                h += `</tr></thead><tbody>`;
                exp.participants.forEach((pName, pi) => {
                    const bg = pi % 2 === 0 ? 'white' : '#fafafe';
                    const cuotas = [];
                    for (let i = 0; i < inst; i++) {
                        let a = pppi;
                        if (exp.customCuotaAmounts?.[pName]?.[i] !== undefined) a = exp.customCuotaAmounts[pName][i];
                        cuotas.push(a);
                    }
                    const totalP = cuotas.reduce((s, a) => s + a, 0);
                    let paidAmt = 0;
                    for (let i = 0; i < inst; i++) { if (exp.installmentPayments?.[i]?.find(pm => pm.participantId === pName && pm.paid)) paidAmt += cuotas[i]; }
                    const pend = totalP - paidAmt;
                    h += `<tr>`;
                    h += `<td style="background:${bg};padding:4px 7px;border:1px solid ${bd};font-weight:600;white-space:nowrap;">${pName}</td>`;
                    h += `<td style="background:${bg};padding:4px 7px;border:1px solid ${bd};text-align:center;">$${_fmtNum(totalP)}</td>`;
                    h += `<td style="background:${bg};padding:4px 7px;border:1px solid ${bd};text-align:center;color:${pend>0?'#cc4400':'#00aa00'};font-weight:600;">$${_fmtNum(pend)}</td>`;
                    for (let i = 0; i < inst; i++) {
                        const pd = exp.installmentPayments?.[i]?.find(pm => pm.participantId === pName && pm.paid);
                        h += `<td style="background:${bg};padding:4px 7px;border:1px solid ${bd};text-align:center;"><span style="color:${pd?'#00aa00':'#cc4400'};font-weight:700;">${pd?'✓':'✗'}</span> <span style="color:#555;">$${_fmtNum(cuotas[i])}</span></td>`;
                    }
                    h += `</tr>`;
                });
                h += `</tbody></table></div>`;
            });
            h += `</div></div>`;
            return h;
        }

        async function compartirTrip(tripId) {
            const trip = trips.find(t => t.id === tripId);
            if (!trip) return;
            const btn = document.getElementById('shareBtn-' + tripId);
            if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

            try {
                const LETTER_W = 1632, LETTER_H = 2112;
                const preview = document.getElementById('sharePreview');
                preview.innerHTML = _buildContent(trip);
                preview.style.width = '760px';

                const rawCanvas = await html2canvas(preview, { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false, width: 760 });
                preview.style.width = '';

                const lc = document.createElement('canvas');
                lc.width = LETTER_W; lc.height = LETTER_H;
                const ctx = lc.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, LETTER_W, LETTER_H);
                const ratio = Math.min(LETTER_W / rawCanvas.width, LETTER_H / rawCanvas.height);
                const dw = Math.round(rawCanvas.width * ratio), dh = Math.round(rawCanvas.height * ratio);
                ctx.drawImage(rawCanvas, Math.round((LETTER_W - dw) / 2), 0, dw, dh);

                lc.toBlob(async (blob) => {
                    const safeName = (trip.name || 'viaje').replace(/\s+/g, '-');
                    const file = new File([blob], safeName + '.png', { type: 'image/png' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ files: [file], title: trip.name }); return; }
                        catch (e) { if (e.name === 'AbortError') return; }
                    }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = safeName + '.png';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                }, 'image/png');
            } catch(e) {
                console.error('Error al compartir:', e);
                alert('Ocurrió un error al generar la imagen.');
            } finally {
                if (btn) { btn.textContent = '📤'; btn.disabled = false; }
            }
        }
        /* ================================ */
    </script>

    <div id="sharePreview" style="position:absolute;left:-9999px;top:0;"></div>

</body>
